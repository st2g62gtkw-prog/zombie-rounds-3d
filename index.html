<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zombie Rounds 3D</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main id="game">
      <canvas id="gameCanvas"></canvas>

      <section id="hud" aria-label="Estado del juego">
        <div>Vida: <span id="healthValue">100</span></div>
        <div>Ronda: <span id="roundValue">1</span></div>
        <div>Enemigos: <span id="enemyValue">0</span></div>
        <div>Puntaje: <span id="scoreValue">0</span></div>
      </section>

      <div id="crosshair" aria-hidden="true"></div>

      <section id="startMessage" class="message">
        <h1>Zombie Rounds 3D</h1>
        <p>Click para capturar el mouse. WASD para moverte. Click para disparar.</p>
      </section>

      <section id="gameOverMessage" class="message hidden" aria-live="polite">
        <h1>Derrota</h1>
        <p>Los zombies llegaron demasiado cerca.</p>
        <button id="restartButton" type="button">Reiniciar</button>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
